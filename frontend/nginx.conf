server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy /api/* → EventOps agent (strips /api prefix)
    # EVENTOPS_API_URL is substituted at container start via envsubst.
    # Default: http://eventops-agent:8000  (works in Docker Compose and Azure Container Apps)
    location /api/ {
        proxy_pass ${EVENTOPS_API_URL}/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout — planning sessions can take several minutes
        proxy_read_timeout    600s;
        proxy_connect_timeout  30s;
        proxy_send_timeout    600s;

        # Disable buffering for SSE / streaming responses
        proxy_buffering off;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
